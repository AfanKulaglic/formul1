<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Checkered flag pattern -->
  <g transform="translate(4,4)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="6" height="6" fill="#fff"/>
    <rect x="6" y="0" width="6" height="6" fill="#222"/>
    <rect x="12" y="0" width="6" height="6" fill="#fff"/>
    <rect x="18" y="0" width="6" height="6" fill="#222"/>
    <!-- Row 2 -->
    <rect x="0" y="6" width="6" height="6" fill="#222"/>
    <rect x="6" y="6" width="6" height="6" fill="#fff"/>
    <rect x="12" y="6" width="6" height="6" fill="#222"/>
    <rect x="18" y="6" width="6" height="6" fill="#fff"/>
    <!-- Row 3 -->
    <rect x="0" y="12" width="6" height="6" fill="#fff"/>
    <rect x="6" y="12" width="6" height="6" fill="#222"/>
    <rect x="12" y="12" width="6" height="6" fill="#fff"/>
    <rect x="18" y="12" width="6" height="6" fill="#222"/>
    <!-- Row 4 -->
    <rect x="0" y="18" width="6" height="6" fill="#222"/>
    <rect x="6" y="18" width="6" height="6" fill="#fff"/>
    <rect x="12" y="18" width="6" height="6" fill="#222"/>
    <rect x="18" y="18" width="6" height="6" fill="#fff"/>
  </g>
  <!-- Racing stripe accent -->
  <rect x="0" y="28" width="32" height="4" rx="0 0 6 6" fill="#e63946"/>
</svg>
